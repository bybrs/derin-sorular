<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Derin Sorular</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0a1a;
      --card-bg: #1a1128;
      --card-border: #2d1f4e;
      --accent: #e8a0bf;
      --accent-light: #f0c4d8;
      --text: #f0e6f6;
      --text-muted: #8b7fa3;
      --like: #4ecdc4;
      --skip: #ff6b6b;
      --romantic: #e8a0bf;
      --fun: #ffd93d;
      --deep: #6c5ce7;
      --bold: #ff6b6b;
      --nostalgic: #a29bfe;
      --dream: #74b9ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(232,160,191,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(108,92,231,0.06) 0%, transparent 50%);
      animation: ambientMove 20s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes ambientMove {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-3%, 3%); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 16px 0;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .header .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Category pills */
    .categories {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 12px 0 20px;
    }

    .cat-pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.3s;
      opacity: 0.5;
    }

    .cat-pill.active { opacity: 1; }
    .cat-pill[data-cat="romantic"] { background: rgba(232,160,191,0.15); border-color: var(--romantic); color: var(--romantic); }
    .cat-pill[data-cat="fun"] { background: rgba(255,217,61,0.15); border-color: var(--fun); color: var(--fun); }
    .cat-pill[data-cat="deep"] { background: rgba(108,92,231,0.15); border-color: var(--deep); color: var(--deep); }
    .cat-pill[data-cat="bold"] { background: rgba(255,107,107,0.15); border-color: var(--bold); color: var(--bold); }
    .cat-pill[data-cat="nostalgic"] { background: rgba(162,155,254,0.15); border-color: var(--nostalgic); color: var(--nostalgic); }
    .cat-pill[data-cat="dream"] { background: rgba(116,185,255,0.15); border-color: var(--dream); color: var(--dream); }

    /* Card area */
    .card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
      min-height: 320px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      min-height: 280px;
      background: linear-gradient(145deg, var(--card-bg), #231842);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
      touch-action: pan-y;
      user-select: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(232,160,191,0.05);
    }

    .card.swiping-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
    .card.swiping-right { transform: translateX(120%) rotate(15deg); opacity: 0; }
    .card.entering { animation: cardEnter 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

    @keyframes cardEnter {
      from { transform: scale(0.8) translateY(40px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .card .cat-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card .question-number {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .card .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      line-height: 1.6;
      font-weight: 600;
    }

    .card .hint {
      margin-top: 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Action buttons */
    .actions {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 24px 0 32px;
    }

    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s;
    }

    .action-btn:active { transform: scale(0.9); }

    .btn-skip {
      border-color: var(--skip);
      color: var(--skip);
    }
    .btn-skip:hover { background: rgba(255,107,107,0.15); }

    .btn-generate {
      border-color: var(--accent);
      color: var(--accent);
      width: 52px;
      height: 52px;
      font-size: 1.2rem;
    }
    .btn-generate:hover { background: rgba(232,160,191,0.15); }

    .btn-like {
      border-color: var(--like);
      color: var(--like);
    }
    .btn-like:hover { background: rgba(78,205,196,0.15); }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-bottom: 16px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .stats span { display: flex; align-items: center; gap: 4px; }

    /* Inactive overlay */
    .inactive-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .inactive-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .inactive-overlay p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .inactive-overlay .heart {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: heartbeat 2s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
    }

    /* Loading spinner */
    .loading {
      display: none;
      width: 32px;
      height: 32px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card.generating .question-text { display: none; }
    .card.generating .loading { display: block; }
    .card.generating .hint { display: none; }
    .card.generating .cat-badge { display: none; }

    /* Swipe hint indicators */
    .swipe-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .swipe-indicator.left { left: -40px; color: var(--skip); }
    .swipe-indicator.right { right: -40px; color: var(--like); }
  </style>
</head>

</div>

  { text: "Birlikte kurmak istedigin bir is/proje var mi?", category: "dream", hint: "Ortak ruyalar" },
  { text: "Eger zamanda yolculuk yapabilsen, hangi doneme giderdin?", category: "dream", hint: "Gecmis mi gelecek mi?" },
  { text: "Hayalindeki yasam temposu nasıl?", category: "dream", hint: "Hızlı mı, sakin mi?" },
  { text: "Dunyaya bir iz bırakacak olsan, nasıl bir iz olsun?", category: "dream", hint: "Kalıcı miras" },
];

// ============================================
// STATE
// ============================================
let currentQuestion = null;
let questionIndex = 0;
let usedIndices = new Set();
let likedCount = 0;
let totalCount = 0;
let activeCategories = new Set(['romantic', 'fun', 'deep', 'bold', 'nostalgic', 'dream']);
let categoryWeights = { romantic: 1, fun: 1, deep: 1, bold: 1, nostalgic: 1, dream: 1 };
let geminiApiKey = null;
let isGenerating = false;

// ============================================
// CATEGORY LABELS
// ============================================
const CAT_LABELS = {
  romantic: 'Romantik',
  fun: 'Eglenceli',
  deep: 'Derin',
  bold: 'Cesur',
  nostalgic: 'Nostaljik',
  dream: 'Hayal'
};

// ============================================
// INIT
// ============================================
async function init() {
  // Check game status
  const { data: config } = await sb.from('game_config').select('is_active, gemini_api_key').eq('id', 1).single();

  if (!config || !config.is_active) {
    document.getElementById('inactiveOverlay').style.display = 'flex';
    document.getElementById('gameContainer').style.display = 'none';
    // Poll every 10 seconds
    setTimeout(init, 10000);
    return;
  }

  document.getElementById('inactiveOverlay').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'flex';
  geminiApiKey = config.gemini_api_key;

  // Load interaction history for weights
  await loadWeights();

  // Show first question
  nextQuestion();
  updateStats();
}

async function loadWeights() {
  const { data: interactions } = await sb.from('interactions').select('category, action');
  if (!interactions) return;

  // Count likes per category
  const likes = {};
  const total = {};
  interactions.forEach(i => {
    total[i.category] = (total[i.category] || 0) + 1;
    if (i.action === 'liked') likes[i.category] = (likes[i.category] || 0) + 1;
  });

  totalCount = interactions.length;
  likedCount = interactions.filter(i => i.action === 'liked').length;

  // Mark used hardcoded questions
  const usedTexts = new Set(interactions.map(i => i.question_text));
  QUESTIONS.forEach((q, idx) => {
    if (usedTexts.has(q.text)) usedIndices.add(idx);
  });

  // Calculate weights (like ratio + base weight)
  Object.keys(categoryWeights).forEach(cat => {
    const t = total[cat] || 0;
    const l = likes[cat] || 0;
    if (t > 0) {
      categoryWeights[cat] = 0.5 + (l / t) * 2; // Range: 0.5 - 2.5
    }
  });
}

// ============================================
// QUESTION SELECTION
// ============================================
function getAvailableQuestions() {
  return QUESTIONS
    .map((q, idx) => ({ ...q, idx }))
    .filter(q => !usedIndices.has(q.idx) && activeCategories.has(q.category));
}

function weightedRandom(questions) {
  const weighted = questions.map(q => ({
    ...q,
    weight: categoryWeights[q.category] || 1
  }));
  const totalWeight = weighted.reduce((sum, q) => sum + q.weight, 0);
  let r = Math.random() * totalWeight;

  for (const q of weighted) {
    r -= q.weight;
    if (r <= 0) return q;
  }
  return weighted[weighted.length - 1];
}

function nextQuestion() {
  const available = getAvailableQuestions();

  if (available.length === 0) {
    // All hardcoded questions used, try generating
    if (geminiApiKey) {
      generateQuestion();
    } else {
      showCard({
        text: "Tum sorular bitti! AI soru uretmek icin admin panelinden Gemini API key ekle.",
        category: "deep",
        hint: "Ya da admin panelinden oyunu sıfırla"
      }, -1);
    }
    return;
  }

  const q = weightedRandom(available);
  showCard(q, q.idx);
}

function showCard(q, idx) {
  currentQuestion = q;
  questionIndex = idx;

  const card = document.getElementById('questionCard');
  const badge = document.getElementById('catBadge');

  card.classList.remove('entering', 'swiping-left', 'swiping-right', 'generating');

  document.getElementById('questionText').textContent = q.text;
  document.getElementById('questionHint').textContent = q.hint || '';
  document.getElementById('questionNumber').textContent = `#${totalCount + 1}`;

  badge.textContent = CAT_LABELS[q.category] || q.category;
  badge.style.background = `var(--${q.category})`;
  badge.style.color = '#0f0a1a';

  // Trigger enter animation
  requestAnimationFrame(() => card.classList.add('entering'));
}

// ============================================
// ACTIONS
// ============================================
async function handleAction(action) {
  if (!currentQuestion || isGenerating) return;

  const card = document.getElementById('questionCard');
  card.classList.add(action === 'liked' ? 'swiping-right' : 'swiping-left');

  // Save interaction
  if (questionIndex >= 0) usedIndices.add(questionIndex);

  await sb.from('interactions').insert({
    question_text: currentQuestion.text,
    category: currentQuestion.category,
    action: action,
    source: questionIndex >= 0 ? 'hardcoded' : 'generated'
  });

  // Update local weights
  if (action === 'liked') {
    categoryWeights[currentQuestion.category] = Math.min(3, (categoryWeights[currentQuestion.category] || 1) + 0.2);
    likedCount++;
  } else {
    categoryWeights[currentQuestion.category] = Math.max(0.2, (categoryWeights[currentQuestion.category] || 1) - 0.1);
  }
  totalCount++;
  updateStats();

  // Next question after animation
  setTimeout(() => nextQuestion(), 400);
}

function updateStats() {
  document.getElementById('likedCount').textContent = likedCount;
  document.getElementById('totalCount').textContent = totalCount;
}

// ============================================
// CATEGORY TOGGLE
// ============================================
function toggleCategory(el) {
  const cat = el.dataset.cat;
  if (activeCategories.has(cat)) {
    if (activeCategories.size <= 1) return; // At least one category
    activeCategories.delete(cat);
    el.classList.remove('active');
  } else {
    activeCategories.add(cat);
    el.classList.add('active');
  }
}

// ============================================
// GEMINI AI GENERATION
// ============================================
async function generateQuestion() {
  if (!geminiApiKey || isGenerating) {
    if (!geminiApiKey) alert('Gemini API key ayarlanmamis. Admin panelinden ekle.');
    return;
  }

  isGenerating = true;
  const card = document.getElementById('questionCard');
  card.classList.add('generating');

  // Build context from recent interactions
  const { data: recent } = await sb
    .from('interactions')
    .select('question_text, category, action')
    .order('created_at', { ascending: false })
    .limit(20);

  const likedQuestions = (recent || []).filter(i => i.action === 'liked').map(i => `- ${i.question_text} (${i.category})`);
  const skippedQuestions = (recent || []).filter(i => i.action === 'skipped').map(i => `- ${i.question_text} (${i.category})`);

  const activeCats = Array.from(activeCategories).map(c => CAT_LABELS[c]).join(', ');

  const prompt = `Sen ciftler icin soru ureten bir asistansın. Turkce sorular uretiyorsun.

Kullanicinin beğendiği sorular:
${likedQuestions.join('\n') || '(henuz yok)'}

Kullanicinin gectigi sorular:
${skippedQuestions.join('\n') || '(henuz yok)'}

Aktif kategoriler: ${activeCats}

Begendigi sorulara benzer ama tekrar etmeyen, yaratıcı ve samimi BIR TANE yeni soru uret.
Cevabını SADECE su JSON formatında ver, baska hicbir sey yazma:
{"text": "soru metni", "category": "kategori_key", "hint": "kısa ipucu"}

Kategori key'leri: romantic, fun, deep, bold, nostalgic, dream`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 200 }
      })
    });

    const data = await res.json();
    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

    // Parse JSON from response
    const jsonMatch = responseText.match(/\{[\s\S]*?\}/);
    if (jsonMatch) {
      const q = JSON.parse(jsonMatch[0]);
      if (q.text && q.category) {
        isGenerating = false;
        showCard(q, -1);
        return;
      }
    }
    throw new Error('Invalid response');
  } catch (err) {
    console.error('Gemini error:', err);
    isGenerating = false;
    card.classList.remove('generating');
    // Fallback to hardcoded
    nextQuestion();
  }
}

// ============================================
// TOUCH SWIPE
// ============================================
let touchStartX = 0;
let touchCurrentX = 0;
let isSwiping = false;

const card = document.getElementById('questionCard');

card.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  isSwiping = true;
  card.style.transition = 'none';
});

card.addEventListener('touchmove', (e) => {
  if (!isSwiping) return;
  touchCurrentX = e.touches[0].clientX;
  const diff = touchCurrentX - touchStartX;
  card.style.transform = `translateX(${diff}px) rotate(${diff * 0.05}deg)`;

  // Show indicators
  const leftInd = document.querySelector('.swipe-indicator.left');
  const rightInd = document.querySelector('.swipe-indicator.right');
  leftInd.style.opacity = diff < -30 ? Math.min(1, Math.abs(diff) / 100) : 0;
  rightInd.style.opacity = diff > 30 ? Math.min(1, diff / 100) : 0;
});

card.addEventListener('touchend', () => {
  if (!isSwiping) return;
  isSwiping = false;
  card.style.transition = '';
  card.style.transform = '';

  document.querySelector('.swipe-indicator.left').style.opacity = 0;
  document.querySelector('.swipe-indicator.right').style.opacity = 0;

  const diff = touchCurrentX - touchStartX;
  if (diff > 80) handleAction('liked');
  else if (diff < -80) handleAction('skipped');
});

// ============================================
// START
// ============================================
init();
</script>
</body>
</html>
