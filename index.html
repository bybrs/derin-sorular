<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Derin Sorular</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0a1a;
      --card-bg: #1a1128;
      --card-border: #2d1f4e;
      --accent: #e8a0bf;
      --accent-light: #f0c4d8;
      --text: #f0e6f6;
      --text-muted: #8b7fa3;
      --like: #4ecdc4;
      --skip: #ff6b6b;
      --pink: #e8a0bf;
      --blue: #74b9ff;
      --romantic: #e8a0bf;
      --fun: #ffd93d;
      --deep: #6c5ce7;
      --bold: #ff6b6b;
      --nostalgic: #a29bfe;
      --dream: #74b9ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(232,160,191,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(108,92,231,0.06) 0%, transparent 50%);
      animation: ambientMove 20s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes ambientMove {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-3%, 3%); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .header { text-align: center; padding: 16px 0; }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mode-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .mode-badge.train { background: rgba(255,217,61,0.15); color: var(--fun); border: 1px solid var(--fun); }
    .mode-badge.play-pink { background: rgba(232,160,191,0.15); color: var(--pink); border: 1px solid var(--pink); }
    .mode-badge.play-blue { background: rgba(116,185,255,0.15); color: var(--blue); border: 1px solid var(--blue); }

    /* Turn indicator */
    .turn-indicator {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 500;
      margin: 8px 0;
      display: none;
    }

    .turn-indicator.pink { color: var(--pink); }
    .turn-indicator.blue { color: var(--blue); }

    /* Category pills */
    .categories {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 12px 0 20px;
    }

    .cat-pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.3s;
      opacity: 0.5;
    }

    .cat-pill.active { opacity: 1; }
    .cat-pill[data-cat="romantic"] { background: rgba(232,160,191,0.15); border-color: var(--romantic); color: var(--romantic); }
    .cat-pill[data-cat="fun"] { background: rgba(255,217,61,0.15); border-color: var(--fun); color: var(--fun); }
    .cat-pill[data-cat="deep"] { background: rgba(108,92,231,0.15); border-color: var(--deep); color: var(--deep); }
    .cat-pill[data-cat="bold"] { background: rgba(255,107,107,0.15); border-color: var(--bold); color: var(--bold); }
    .cat-pill[data-cat="nostalgic"] { background: rgba(162,155,254,0.15); border-color: var(--nostalgic); color: var(--nostalgic); }
    .cat-pill[data-cat="dream"] { background: rgba(116,185,255,0.15); border-color: var(--dream); color: var(--dream); }

    /* Card area */
    .card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
      min-height: 320px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      min-height: 280px;
      background: linear-gradient(145deg, var(--card-bg), #231842);
      border: 2px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s, border-color 0.3s;
      touch-action: pan-y;
      user-select: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(232,160,191,0.05);
    }

    .card.turn-pink { border-color: var(--pink); box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 30px rgba(232,160,191,0.15); }
    .card.turn-blue { border-color: var(--blue); box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 30px rgba(116,185,255,0.15); }

    /* Stick figure behind card */
    .card .stick-figure {
      position: absolute;
      bottom: 12px;
      right: 16px;
      opacity: 0.12;
      pointer-events: none;
    }

    .card .stick-figure svg { width: 60px; height: 80px; }

    .card.swiping-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
    .card.swiping-right { transform: translateX(120%) rotate(15deg); opacity: 0; }
    .card.entering { animation: cardEnter 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

    @keyframes cardEnter {
      from { transform: scale(0.8) translateY(40px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .card .cat-badge {
      position: absolute;
      top: 16px; left: 16px;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card .question-number {
      position: absolute;
      top: 16px; right: 16px;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* Answer badges on card (play mode) */
    .answer-badges {
      position: absolute;
      bottom: 16px; right: 16px;
      display: flex;
      gap: 6px;
    }

    .answer-badge {
      width: 10px; height: 10px;
      border-radius: 50%;
      opacity: 0.3;
    }

    .answer-badge.filled { opacity: 1; }
    .answer-badge.ab-pink { background: var(--pink); }
    .answer-badge.ab-blue { background: var(--blue); }

    .card .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      line-height: 1.6;
      font-weight: 600;
    }

    .card .hint {
      margin-top: 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Edit overlay */
    .edit-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15,10,26,0.95);
      border-radius: 24px;
      padding: 24px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .edit-overlay.active { display: flex; }

    .edit-overlay textarea {
      width: 100%;
      min-height: 120px;
      background: transparent;
      border: 1.5px solid var(--card-border);
      border-radius: 12px;
      padding: 14px;
      color: var(--text);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      line-height: 1.5;
      resize: none;
      outline: none;
    }

    .edit-overlay textarea:focus { border-color: var(--accent); }

    .edit-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .edit-btn {
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid;
    }

    .edit-btn.save { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .edit-btn.cancel { background: transparent; border-color: var(--text-muted); color: var(--text-muted); }

    /* Action buttons */
    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 24px 0 32px;
    }

    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s;
    }

    .action-btn:active { transform: scale(0.9); }
    .action-btn.small { width: 48px; height: 48px; font-size: 1.1rem; }

    .btn-skip { border-color: var(--skip); color: var(--skip); }
    .btn-skip:hover { background: rgba(255,107,107,0.15); }

    .btn-edit { border-color: var(--text-muted); color: var(--text-muted); }
    .btn-edit:hover { background: rgba(139,127,163,0.15); }

    .btn-generate { border-color: var(--accent); color: var(--accent); }
    .btn-generate:hover { background: rgba(232,160,191,0.15); }

    .btn-like { border-color: var(--like); color: var(--like); }
    .btn-like:hover { background: rgba(78,205,196,0.15); }

    /* Play mode buttons */
    .btn-pass { border-color: var(--text-muted); color: var(--text-muted); }
    .btn-pass:hover { background: rgba(139,127,163,0.15); }

    .btn-answered { border-color: var(--pink); color: var(--pink); }
    .btn-answered:hover { background: rgba(232,160,191,0.1); }

    .btn-done { border-color: var(--like); color: var(--like); }
    .btn-done:hover { background: rgba(78,205,196,0.15); }

    /* Button labels */
    .action-btn .btn-label {
      position: absolute;
      bottom: -18px;
      font-size: 0.55rem;
      font-weight: 500;
      white-space: nowrap;
      color: inherit;
      opacity: 0.7;
    }

    .action-btn { position: relative; }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-bottom: 16px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .stats span { display: flex; align-items: center; gap: 4px; }

    /* Inactive overlay */
    .inactive-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .inactive-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .inactive-overlay p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }

    .inactive-overlay .heart {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: heartbeat 2s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
    }

    .loading {
      display: none;
      width: 32px; height: 32px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card.generating .question-text { display: none; }
    .card.generating .loading { display: block; }
    .card.generating .hint { display: none; }
    .card.generating .cat-badge { display: none; }

    .swipe-indicator {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      font-size: 2rem; opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .swipe-indicator.left { left: -40px; color: var(--skip); }
    .swipe-indicator.right { right: -40px; color: var(--like); }
  </style>
</head>
<body>

<!-- INACTIVE -->
<div class="inactive-overlay" id="inactiveOverlay" style="display:none;">
  <div class="heart">&#10084;&#65039;</div>
  <h2>Derin Sorular</h2>
  <p>Oyun henuz aktif degil.<br>Biraz sabir, birazdan basliyoruz...</p>
</div>

<!-- GAME -->
<div class="container" id="gameContainer">
  <div class="header">
    <h1>Derin Sorular</h1>
    <div class="mode-badge" id="modeBadge"></div>
  </div>

  <!-- Turn indicator (play mode) -->
  <div class="turn-indicator" id="turnIndicator"></div>

  <!-- Categories (train mode only) -->
  <div class="categories" id="categories">
    <div class="cat-pill active" data-cat="romantic" onclick="toggleCategory(this)">Romantik</div>
    <div class="cat-pill active" data-cat="fun" onclick="toggleCategory(this)">Eglenceli</div>
    <div class="cat-pill active" data-cat="deep" onclick="toggleCategory(this)">Derin</div>
    <div class="cat-pill active" data-cat="bold" onclick="toggleCategory(this)">Cesur</div>
    <div class="cat-pill active" data-cat="nostalgic" onclick="toggleCategory(this)">Nostaljik</div>
    <div class="cat-pill active" data-cat="dream" onclick="toggleCategory(this)">Hayal</div>
  </div>

  <div class="card-area">
    <div class="swipe-indicator left">&#10060;</div>
    <div class="card" id="questionCard">
      <div class="cat-badge" id="catBadge"></div>
      <div class="question-number" id="questionNumber"></div>
      <div class="question-text" id="questionText">Yukleniyor...</div>
      <div class="hint" id="questionHint"></div>
      <div class="loading"></div>
      <!-- Answer status badges (play mode) -->
      <div class="answer-badges" id="answerBadges" style="display:none;">
        <div class="answer-badge ab-pink" id="badgePink"></div>
        <div class="answer-badge ab-blue" id="badgeBlue"></div>
      </div>
      <!-- Stick figure -->
      <div class="stick-figure" id="stickFigure" style="display:none;"></div>
      <!-- Edit overlay -->
      <div class="edit-overlay" id="editOverlay">
        <textarea id="editTextarea"></textarea>
        <div class="edit-actions">
          <button class="edit-btn cancel" onclick="cancelEdit()">Vazgec</button>
          <button class="edit-btn save" onclick="saveEdit()">Kaydet</button>
        </div>
      </div>
    </div>
    <div class="swipe-indicator right">&#10084;&#65039;</div>
  </div>

  <!-- Train mode actions -->
  <div class="actions" id="trainActions">
    <button class="action-btn btn-skip" onclick="handleAction('skipped')" title="Gec">&#10060;</button>
    <button class="action-btn btn-edit small" onclick="openEdit()" title="Duzenle">&#9998;&#65039;</button>
    <button class="action-btn btn-generate small" onclick="generateQuestion()" title="AI Soru Uret">&#10024;</button>
    <button class="action-btn btn-like" onclick="handleAction('liked')" title="Havuza Ekle">&#10084;&#65039;</button>
  </div>

  <!-- Play mode actions -->
  <div class="actions" id="playActions" style="display:none;">
    <button class="action-btn btn-pass" onclick="playSkip()" title="Simdilik Gec">
      &#10145;&#65039;
      <span class="btn-label">Simdilik Gec</span>
    </button>
    <button class="action-btn btn-answered" id="btnAnswered" onclick="playAnswered(currentTurn)">
      &#10084;&#65039;
      <span class="btn-label" id="btnAnsweredLabel">Yanitladim</span>
    </button>
    <button class="action-btn btn-done" onclick="playDone()" title="Bir daha sorma">
      &#10003;
      <span class="btn-label">Bir Daha Sorma</span>
    </button>
  </div>

  <div class="stats">
    <span>&#10084;&#65039; <span id="likedCount">0</span> <span id="statsLabel1">havuzda</span></span>
    <span>&#128172; <span id="totalCount">0</span> <span id="statsLabel2">toplam</span></span>
  </div>
</div>

let gameMode = 'train';
let currentQuestion = null;
let questionIndex = 0;
let usedIndices = new Set();
let likedCount = 0;
let totalCount = 0;
let activeCategories = new Set(['romantic', 'fun', 'deep', 'bold', 'nostalgic', 'dream']);
let categoryWeights = { romantic: 1, fun: 1, deep: 1, bold: 1, nostalgic: 1, dream: 1 };

// Play mode state

async function init() {
  const { data: config } = await sb.from('game_config').select('is_active, gemini_api_key, game_mode').eq('id', 1).single();

  if (!config || !config.is_active) {
    document.getElementById('inactiveOverlay').style.display = 'flex';
    document.getElementById('gameContainer').style.display = 'none';
    setTimeout(init, 10000);
    return;
  }

  document.getElementById('inactiveOverlay').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'flex';
  geminiApiKey = config.gemini_api_key;
  gameMode = config.game_mode || 'train';

  setupMode();
  await loadData();

  if (gameMode === 'train') {
    nextQuestion();
  } else {
    showNextPlayQuestion();
  }
  updateStats();
}

// ============================================
// LOAD DATA
// ============================================
async function loadData() {
  const { data: interactions } = await sb.from('interactions').select('id, question_text, category, action, source, answered_by');
  if (!interactions) return;

  totalCount = interactions.length;
  likedCount = interactions.filter(i => i.action === 'liked').length;

  // Mark used hardcoded questions (for train mode)
  const usedTexts = new Set(interactions.map(i => i.question_text));
  QUESTIONS.forEach((q, idx) => {
    if (usedTexts.has(q.text)) usedIndices.add(idx);
  });

  // Calculate category weights
  const likes = {};
  const totals = {};
  interactions.forEach(i => {
    totals[i.category] = (totals[i.category] || 0) + 1;
    if (i.action === 'liked') likes[i.category] = (likes[i.category] || 0) + 1;
  });

  Object.keys(categoryWeights).forEach(cat => {
    const t = totals[cat] || 0;
    const l = likes[cat] || 0;
    if (t > 0) categoryWeights[cat] = 0.5 + (l / t) * 2;
  });

  // Build play pool: liked questions that current turn hasn't fully answered
  playPool = interactions
    .filter(i => i.action === 'liked' && i.answered_by !== 'both')
    .map(i => ({
      id: i.id,
      text: i.question_text,
      category: i.category,
      hint: '',
      answered_by: i.answered_by || null
    }));

  // Shuffle
  for (let i = playPool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [playPool[i], playPool[j]] = [playPool[j], playPool[i]];
  }
}

// ============================================
// PLAY MODE
// ============================================
function getQuestionsForTurn() {
  // Return questions that current turn person hasn't answered yet
  return playPool.filter(q => {
    if (q.answered_by === 'both') return false;
    if (q.answered_by === currentTurn) return false;
    return true;
  });
}

function showNextPlayQuestion() {
  const available = getQuestionsForTurn();

  if (available.length === 0) {
    // Check if other turn has questions
    const otherTurn = currentTurn === 'pink' ? 'blue' : 'pink';
    const otherAvailable = playPool.filter(q => q.answered_by !== 'both' && q.answered_by !== otherTurn);

    if (otherAvailable.length > 0) {
      currentTurn = otherTurn;
      updateTurnUI();
      showNextPlayQuestion();
      return;
    }

    currentPlayQuestion = null;
    document.getElementById('questionCard').classList.remove('turn-pink', 'turn-blue');
    showCard({ text: "Tum sorular yanitlandi! Egit modundan yeni sorular ekle veya admin'den sifirla.", category: "romantic", hint: "" }, -1);
    updateStats();
    return;
  }

  currentPlayQuestion = available[0];
  showCard(currentPlayQuestion, -1);
  updateAnswerBadges();
  updateStats();
}

function updateAnswerBadges() {
  if (!currentPlayQuestion || gameMode !== 'play') return;
  const ab = currentPlayQuestion.answered_by;
  document.getElementById('badgePink').className = 'answer-badge ab-pink' + ((ab === 'pink' || ab === 'both') ? ' filled' : '');
  document.getElementById('badgeBlue').className = 'answer-badge ab-blue' + ((ab === 'blue' || ab === 'both') ? ' filled' : '');
}

async function playSkip() {
  if (!currentPlayQuestion) return;

  const card = document.getElementById('questionCard');
  card.classList.add('swiping-left');

  // Move to end of pool (don't mark anything)
  const idx = playPool.findIndex(q => q.id === currentPlayQuestion.id);
  if (idx > -1) {
    const [item] = playPool.splice(idx, 1);
    playPool.push(item);
  }

  // Switch turn
  currentTurn = currentTurn === 'pink' ? 'blue' : 'pink';
  updateTurnUI();

  setTimeout(() => showNextPlayQuestion(), 400);
}

async function playAnswered(who) {
  if (!currentPlayQuestion) return;

  const card = document.getElementById('questionCard');
  card.classList.add('swiping-right');

  const q = currentPlayQuestion;
  let newStatus;

  if (q.answered_by === null) {
    newStatus = who;
  } else if (q.answered_by !== who) {
    newStatus = 'both';
  } else {
    // Already answered by this person, skip
    newStatus = q.answered_by;
  }

  // Update in DB
  await sb.from('interactions').update({ answered_by: newStatus }).eq('id', q.id);

  // Update in pool
  const idx = playPool.findIndex(p => p.id === q.id);
  if (idx > -1) {
    if (newStatus === 'both') {
      playPool.splice(idx, 1);
    } else {
      playPool[idx].answered_by = newStatus;
    }
  }

  // Switch turn
  currentTurn = currentTurn === 'pink' ? 'blue' : 'pink';
  updateTurnUI();

  setTimeout(() => showNextPlayQuestion(), 400);
}

async function playDone() {
  if (!currentPlayQuestion) return;

  const card = document.getElementById('questionCard');
  card.classList.add('swiping-right');

  // Mark as both answered
  await sb.from('interactions').update({ answered_by: 'both' }).eq('id', currentPlayQuestion.id);

  // Remove from pool
  const idx = playPool.findIndex(p => p.id === currentPlayQuestion.id);
  if (idx > -1) playPool.splice(idx, 1);

  // Switch turn
  currentTurn = currentTurn === 'pink' ? 'blue' : 'pink';
  updateTurnUI();

  setTimeout(() => showNextPlayQuestion(), 400);
}

// ============================================
// TRAIN MODE - QUESTION SELECTION
// ============================================
function getAvailableQuestions() {
  return QUESTIONS
    .map((q, idx) => ({ ...q, idx }))
    .filter(q => !usedIndices.has(q.idx) && activeCategories.has(q.category));
}

function weightedRandom(questions) {
  const weighted = questions.map(q => ({ ...q, weight: categoryWeights[q.category] || 1 }));
  const totalWeight = weighted.reduce((sum, q) => sum + q.weight, 0);
  let r = Math.random() * totalWeight;
  for (const q of weighted) {
    r -= q.weight;
    if (r <= 0) return q;
  }
  return weighted[weighted.length - 1];
}

function nextQuestion() {
  const available = getAvailableQuestions();
  if (available.length === 0) {
    if (geminiApiKey) {
      generateQuestion();
    } else {
      showCard({ text: "Tum sorular bitti! AI soru uretmek icin admin panelinden Gemini API key ekle.", category: "deep", hint: "" }, -1);
    }
    return;
  }
  const q = weightedRandom(available);
  showCard(q, q.idx);
}

// ============================================
// SHOW CARD
// ============================================
function showCard(q, idx) {
  currentQuestion = q;
  questionIndex = idx;

  const card = document.getElementById('questionCard');
  const badge = document.getElementById('catBadge');

  card.classList.remove('entering', 'swiping-left', 'swiping-right', 'generating');

  document.getElementById('questionText').textContent = q.text;
  document.getElementById('questionHint').textContent = q.hint || '';

  if (gameMode === 'train') {
    document.getElementById('questionNumber').textContent = `#${totalCount + 1}`;
  } else {
    const remaining = getQuestionsForTurn().length;
    document.getElementById('questionNumber').textContent = `${remaining} kalan`;
  }

  badge.textContent = CAT_LABELS[q.category] || q.category;
  badge.style.background = `var(--${q.category})`;
  badge.style.color = '#0f0a1a';

  requestAnimationFrame(() => card.classList.add('entering'));
}

// ============================================
// TRAIN MODE ACTIONS
// ============================================
async function handleAction(action) {
  if (!currentQuestion || isGenerating || isEditing) return;

  const card = document.getElementById('questionCard');
  card.classList.add(action === 'liked' ? 'swiping-right' : 'swiping-left');

  if (questionIndex >= 0) usedIndices.add(questionIndex);

  const questionText = document.getElementById('questionText').textContent;

  const { data: inserted } = await sb.from('interactions').insert({
    question_text: questionText,
    category: currentQuestion.category,
    action: action,
    source: questionIndex >= 0 ? 'hardcoded' : 'generated'
  }).select('id').single();

  if (action === 'liked') {
    categoryWeights[currentQuestion.category] = Math.min(3, (categoryWeights[currentQuestion.category] || 1) + 0.2);
    likedCount++;
    // Add to play pool
    if (inserted) {
      playPool.push({ id: inserted.id, text: questionText, category: currentQuestion.category, hint: '', answered_by: null });
    }
  } else {
    categoryWeights[currentQuestion.category] = Math.max(0.2, (categoryWeights[currentQuestion.category] || 1) - 0.1);
  }
  totalCount++;
  updateStats();

  setTimeout(() => nextQuestion(), 400);
}

// ============================================
// EDIT
// ============================================
function openEdit() {
  if (!currentQuestion || isGenerating) return;
  isEditing = true;
  document.getElementById('editTextarea').value = document.getElementById('questionText').textContent;
  document.getElementById('editOverlay').classList.add('active');
  document.getElementById('editTextarea').focus();
}

function cancelEdit() {
  isEditing = false;
  document.getElementById('editOverlay').classList.remove('active');
}

function saveEdit() {
  const newText = document.getElementById('editTextarea').value.trim();
  if (newText) document.getElementById('questionText').textContent = newText;
  isEditing = false;
  document.getElementById('editOverlay').classList.remove('active');
}

// ============================================
// STATS
// ============================================
function updateStats() {
  if (gameMode === 'train') {
    document.getElementById('likedCount').textContent = likedCount;
    document.getElementById('totalCount').textContent = totalCount;
  } else {
    const remaining = playPool.filter(q => q.answered_by !== 'both').length;
    const done = playPool.length === 0 ? likedCount : likedCount - remaining;
    document.getElementById('likedCount').textContent = remaining;
    document.getElementById('totalCount').textContent = Math.max(0, done);
  }
}

// ============================================
// CATEGORY TOGGLE
// ============================================
function toggleCategory(el) {
  const cat = el.dataset.cat;
  if (activeCategories.has(cat)) {
    if (activeCategories.size <= 1) return;
    activeCategories.delete(cat);
    el.classList.remove('active');
  } else {
    activeCategories.add(cat);
    el.classList.add('active');
  }
}

// ============================================
// GEMINI AI GENERATION
// ============================================
async function generateQuestion() {
  if (!geminiApiKey || isGenerating) {
    if (!geminiApiKey) alert('Gemini API key ayarlanmamis. Admin panelinden ekle.');
    return;
  }

  isGenerating = true;
  document.getElementById('questionCard').classList.add('generating');

  const { data: recent } = await sb
    .from('interactions')
    .select('question_text, category, action')
    .order('created_at', { ascending: false })
    .limit(20);

  const likedQs = (recent || []).filter(i => i.action === 'liked').map(i => `- ${i.question_text} (${i.category})`);
  const skippedQs = (recent || []).filter(i => i.action === 'skipped').map(i => `- ${i.question_text} (${i.category})`);
  const activeCats = Array.from(activeCategories).map(c => CAT_LABELS[c]).join(', ');

  const prompt = `Sen ciftler icin soru ureten bir asistansın. Turkce sorular uretiyorsun.

Kullanicinin beğendiği sorular:
${likedQs.join('\n') || '(henuz yok)'}

Kullanicinin gectigi sorular:
${skippedQs.join('\n') || '(henuz yok)'}

Aktif kategoriler: ${activeCats}

Begendigi sorulara benzer ama tekrar etmeyen, yaratıcı ve samimi BIR TANE yeni soru uret.
Cevabını SADECE su JSON formatında ver, baska hicbir sey yazma:
{"text": "soru metni", "category": "kategori_key", "hint": "kısa ipucu"}

Kategori key'leri: romantic, fun, deep, bold, nostalgic, dream`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 200 }
      })
    });

    const data = await res.json();
    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const jsonMatch = responseText.match(/\{[\s\S]*?\}/);
    if (jsonMatch) {
      const q = JSON.parse(jsonMatch[0]);
      if (q.text && q.category) {
        isGenerating = false;
        showCard(q, -1);
        return;
      }
    }
    throw new Error('Invalid response');
  } catch (err) {
    console.error('Gemini error:', err);
    isGenerating = false;
    document.getElementById('questionCard').classList.remove('generating');
    nextQuestion();
  }
}

// ============================================
// TOUCH SWIPE (train mode only)
// ============================================
let touchStartX = 0;
let touchCurrentX = 0;
let isTouchSwiping = false;

const cardEl = document.getElementById('questionCard');

cardEl.addEventListener('touchstart', (e) => {
  if (gameMode !== 'train' || isEditing) return;
  touchStartX = e.touches[0].clientX;
  isTouchSwiping = true;
  cardEl.style.transition = 'none';
});

cardEl.addEventListener('touchmove', (e) => {
  if (!isTouchSwiping || gameMode !== 'train') return;
  touchCurrentX = e.touches[0].clientX;
  const diff = touchCurrentX - touchStartX;
  cardEl.style.transform = `translateX(${diff}px) rotate(${diff * 0.05}deg)`;
  document.querySelector('.swipe-indicator.left').style.opacity = diff < -30 ? Math.min(1, Math.abs(diff) / 100) : 0;
  document.querySelector('.swipe-indicator.right').style.opacity = diff > 30 ? Math.min(1, diff / 100) : 0;
});

cardEl.addEventListener('touchend', () => {
  if (!isTouchSwiping || gameMode !== 'train') return;
  isTouchSwiping = false;
  cardEl.style.transition = '';
  cardEl.style.transform = '';
  document.querySelector('.swipe-indicator.left').style.opacity = 0;
  document.querySelector('.swipe-indicator.right').style.opacity = 0;
  const diff = touchCurrentX - touchStartX;
  if (diff > 80) handleAction('liked');
  else if (diff < -80) handleAction('skipped');
});

// ============================================
// START
// ============================================
init();
</script>
